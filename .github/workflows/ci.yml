name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Configure
        run: cmake -S . -B build -DANOMALY_KERNELS_TESTS=ON
      - name: Build
        run: cmake --build build --config Debug -j 2
      - name: Test
        run: ctest --test-dir build -C Debug --output-on-failure
